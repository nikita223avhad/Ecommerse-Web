<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Nexora</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/products.css" />
    <link rel="stylesheet" href="css/chatbot.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html"><span>N</span>Nexora</a>
      <form class="search-bar" data-search-form><input name="q" placeholder="Search products" /><button>Search</button></form>
      <nav><a class="active" href="products.html">Products</a><a href="orders.html">Orders</a><a href="cart.html">Cart</a><a href="login.html" data-auth-link>Login</a></nav>
    </header>
    <main class="catalog-layout">
      <aside class="filters">
        <h2>Filters</h2>
        <label>Category<select id="categoryFilter"><option value="">All</option></select></label>
        <label>Max price <strong id="priceValue">$1000</strong><input id="priceFilter" type="range" min="0" max="1000" value="1000" /></label>
        <label>Rating<select id="ratingFilter"><option value="">Any</option><option value="4">4+</option><option value="3">3+</option></select></label>
        <label class="check"><input id="stockFilter" type="checkbox" /> In stock only</label>
        <button class="btn ghost" id="resetFilters">Reset</button>
      </aside>
      <section>
        <div class="page-head">
          <div><p class="eyebrow">Catalog</p><h1>Products</h1></div>
          <select id="sortProducts"><option value="newest">Newest</option><option value="relevance">Relevance</option><option value="price-low">Price low to high</option><option value="price-high">Price high to low</option></select>
        </div>
        <div id="productGrid" class="product-grid"></div>
      </section>
    </main>
    <div id="chatbotWidget"></div>
    <script type="module" src="js/pages/products.js"></script>
    <script type="module" src="js/pages/chatbot.js"></script>
  </body>
</html>
