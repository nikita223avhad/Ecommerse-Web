<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product - Nexora</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <header class="topbar admin-top"><a class="brand" href="admin-dashboard.html"><span>N</span>Nexora Admin</a><nav><a href="admin-products.html">Products</a><a href="admin-orders.html">Orders</a></nav></header>
    <main class="admin-layout form-card">
      <p class="eyebrow">Inventory</p>
      <h1>Add product</h1>
      <form id="addProductForm" class="form-grid">
    <label>Name
        <input name="name" required />
    </label>

    <label>Category
        <input name="category" required />
    </label>

    <label>Price
        <input name="price" type="number" required />
    </label>

    <label>Stock
        <input name="stock" type="number" required />
    </label>

   <label>Upload Image
    <input id="productFile" name="file" type="file" accept=".jpg,.jpeg,.png" required>
   </label>

    <label class="wide">
        Description
        <textarea name="description" required></textarea>
    </label>

    <button class="btn primary wide">
        Save Product
    </button>
</form>
    </main>
    <script type="module" src="js/pages/add-product.js"></script>
  </body>
</html>
