<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Nexora</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body class="no-footer">
    <main class="auth-page">
      <section class="auth-card">
        <a class="brand" href="index.html"><span>N</span>Nexora Admin</a>
        <p class="eyebrow">Secure access</p>
        <h1>Admin Login</h1>
        <form id="adminLoginForm" class="auth-form">
          <label>Email<input name="email" type="email" required /></label>
          <label>Password<input name="password" type="password" required /></label>
          <button class="btn primary">Login as Admin</button>
        </form>
        <p><a href="login.html">Customer login</a></p>
      </section>
    </main>
    <script type="module" src="js/pages/admin-login.js"></script>
  </body>
</html>
